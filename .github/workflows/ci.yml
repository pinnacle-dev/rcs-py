name: ci

on: [push]
jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up python
        uses: actions/setup-python@v4
        with:
          python-version: 3.8
      - name: Bootstrap poetry
        run: |
          curl -sSL https://install.python-poetry.org | python - -y --version 1.5.1
      - name: Install dependencies
        run: poetry install
      - name: Compile
        run: poetry run mypy .
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up python
        uses: actions/setup-python@v4
        with:
          python-version: 3.8
      - name: Bootstrap poetry
        run: |
          curl -sSL https://install.python-poetry.org | python - -y --version 1.5.1
      - name: Install dependencies
        run: poetry install

      - name: Test
        run: poetry run pytest -rP .

  publish:
    needs: [compile, test]
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up python
        uses: actions/setup-python@v4
        with:
          python-version: 3.8
      - name: Bootstrap poetry
        run: |
          curl -sSL https://install.python-poetry.org | python - -y --version 1.5.1
      - name: Install dependencies
        run: poetry install
      - name: Publish to pypi
        # PyPI uses PEP 440 version-string semantics for pre-releases — a
        # version like `2.0.22rc1` is automatically hidden from
        # `pip install rcs` and only installs via `pip install rcs --pre`
        # or an explicit `==2.0.22rc1`. No dist-tag flag is needed here;
        # the `poetry publish` call below is identical for stable and
        # pre-release tags. We just log which variant we're publishing.
        run: |
          if [[ ${GITHUB_REF} == *rc* ]]; then
            echo "Publishing pre-release (RC) — PyPI will hide from plain 'pip install rcs'"
          elif [[ ${GITHUB_REF} == *alpha* ]]; then
            echo "Publishing pre-release (alpha)"
          elif [[ ${GITHUB_REF} == *beta* ]]; then
            echo "Publishing pre-release (beta)"
          else
            echo "Publishing stable release"
          fi
          poetry config repositories.remote https://upload.pypi.org/legacy/
          poetry --no-interaction -v publish --build --repository remote --username "$PYPI_USERNAME" --password "$PYPI_PASSWORD"
        env:
          PYPI_USERNAME: ${{ secrets.PYPI_USERNAME }}
          PYPI_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
